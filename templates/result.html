{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card glass-panel border-0 shadow-lg rounded-4 overflow-hidden text-center">
            <div class="card-header bg-success text-white py-3 border-0">
                <h4 class="mb-0 fw-bold"><i class="bi bi-check-circle-fill me-2"></i>Hasil Prediksi</h4>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <img src="{{ url_for('uploaded_file', filename=result.filename) }}" alt="Uploaded Image" class="img-fluid rounded-4 shadow-sm border border-2 border-white max-h-300 object-fit-cover">
                </div>
                
                <h2 class="display-5 fw-bold text-gradient mb-2">{{ result.class }}</h2>
                
                <div class="d-flex justify-content-center align-items-center mb-4">
                    <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 fs-6">
                        <i class="bi bi-cpu-fill me-1"></i> Model: {{ result.model }}
                    </span>
                </div>

                <div class="confidence-container bg-light p-3 rounded-4 mb-4 text-start">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="fw-semibold text-muted">Confidence Score</span>
                        <span class="fw-bold text-success">{{ result.confidence }}%</span>
                    </div>
                    <div class="progress" style="height: 12px;">
                        <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: {{ result.confidence }}%" aria-valuenow="{{ result.confidence }}" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="{{ url_for('predict') }}" class="btn btn-primary rounded-pill px-4 shadow-sm hover-lift">
                        <i class="bi bi-arrow-repeat me-1"></i>Deteksi Gambar Lain
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
