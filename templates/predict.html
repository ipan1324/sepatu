{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card glass-panel border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-3 border-0">
                <h4 class="mb-0 fw-bold"><i class="bi bi-cloud-upload me-2"></i>Deteksi Sepatu</h4>
            </div>
            <div class="card-body p-4 p-md-5">
                <p class="text-center text-muted mb-4">Unggah gambar sepatu (JPG, PNG) untuk diklasifikasi oleh model AI kami.</p>
                
                <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data" id="uploadForm">
                    <!-- Custom File Upload Area -->
                    <div class="upload-area rounded-4 border-2 border-dashed border-primary text-center p-5 mb-4 position-relative" id="uploadArea">
                        <input type="file" name="file" id="fileInput" class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer" accept=".jpg,.jpeg,.png,.webp" required>
                        <div id="uploadPlaceholder">
                            <i class="bi bi-cloud-arrow-up display-3 text-primary mb-3"></i>
                            <h5 class="fw-semibold">Tarik & Letakkan Gambar atau Klik</h5>
                            <p class="small text-muted mb-0">Mendukung format JPG, JPEG, PNG</p>
                        </div>
                        <div id="imagePreviewContainer" class="d-none">
                            <img id="imagePreview" src="#" alt="Preview" class="img-fluid rounded-3 max-h-200 object-fit-cover mx-auto">
                            <p class="mt-2 text-muted small" id="fileName"></p>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm" id="submitBtn">
                            <i class="bi bi-search me-2"></i>Mulai Prediksi
                        </button>
                    </div>
                </form>
                
                <!-- Loading State (Hidden initially) -->
                <div id="loadingState" class="text-center d-none mt-4">
                    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 class="mt-3 fw-bold text-primary animate-pulse">AI sedang menganalisis gambar...</h5>
                    <div class="progress mt-3" style="height: 10px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
